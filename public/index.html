<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>ChatGPTクローン (第5章: 会話ログと複数セッション)</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
    #sidebar { width: 260px; border-right: 1px solid #ccc; padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; }
    #main { flex: 1; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    #log { border: 1px solid #ccc; padding: 12px; min-height: 300px; white-space: pre-wrap; }
    form { display: flex; gap: 8px; margin-top: 12px; }
    input { flex: 1; padding: 8px; }
    button { padding: 8px 16px; cursor: pointer; }
    .conv-item { padding: 8px; cursor: pointer; border-radius: 4px; }
    .conv-item:hover { background: #eee; }
    .conv-item.active { background: #ddd; }
    #userInfo { font-size: 12px; color: #666; margin-bottom: 8px; word-break: break-all; }
    #loginScreen { margin: 80px auto; text-align: center; }
  </style>
</head>
<body>
  <div id="loginScreen" style="display: none;">
    <h1>ChatGPTクローン</h1>
    <p>会話を保存するにはログインしてください。</p>
    <button id="loginBtn">Googleでログイン</button>
  </div>

  <div id="appScreen" style="display: none; width: 100%;">
    <div id="sidebar">
      <div id="userInfo"></div>
      <div id="usageCounter" style="font-size: 12px; color: #666; margin-bottom: 8px;"></div>
      <div id="tokenCounter" style="font-size: 12px; color: #666; margin-bottom: 8px;"></div>
      <button id="newConvBtn">＋ 新しい会話</button>
      <button id="logoutBtn" style="margin-top: 8px;">ログアウト</button>
      <hr style="width: 100%;" />
      <div id="convList"></div>
    </div>
    <div id="main">
      <h1>ChatGPTクローン</h1>
      <div id="log"></div>
      <form id="form">
        <input id="input" type="text" placeholder="メッセージを入力" autocomplete="off" />
        <button type="submit">送信</button>
      </form>
      <button id="rememberBtn" style="margin-top: 8px;">覚えておいて</button>
      <div id="memoryStatus" style="font-size: 12px; color: #666; margin-top: 4px;"></div>
    </div>
  </div>

  <script>
    const SYSTEM_PROMPT = "あなたは侍言葉を話す親切なアシスタントです。";
    const RECENT_WINDOW_SIZE = 10; // AIに毎回渡す「直近」の発言件数

    let supabaseClient;
    let currentUser = null;
    let currentConversationId = null;
    // 表示中の会話の全文履歴(system除く、DBの内容と一致)。要約されても消さずに残す。
    let fullHistory = [];
    // これまでの要約文。空文字なら「まだ要約なし」。
    let conversationSummary = "";
    // fullHistoryの何件目までを、すでにconversationSummaryへ組み込み済みか。
    let summarizedCount = 0;
    // ユーザーの永続的な記憶(会話をまたいで、どの会話にも差し込まれる)。
    let userMemory = "";

    const loginScreen = document.getElementById("loginScreen");
    const appScreen = document.getElementById("appScreen");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const newConvBtn = document.getElementById("newConvBtn");
    const userInfo = document.getElementById("userInfo");
    const usageCounter = document.getElementById("usageCounter");
    const tokenCounter = document.getElementById("tokenCounter");
    const convList = document.getElementById("convList");
    const logEl = document.getElementById("log");
    const formEl = document.getElementById("form");
    const inputEl = document.getElementById("input");
    const rememberBtn = document.getElementById("rememberBtn");
    const memoryStatus = document.getElementById("memoryStatus");

    async function init() {
      const res = await fetch("/api/config");
      const { supabaseUrl, supabaseAnonKey } = await res.json();
      supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

      supabaseClient.auth.onAuthStateChange((_event, session) => {
        handleSession(session);
      });

      const { data: { session } } = await supabaseClient.auth.getSession();
      handleSession(session);
    }

    function handleSession(session) {
      currentUser = session?.user ?? null;
      if (currentUser) {
        loginScreen.style.display = "none";
        appScreen.style.display = "flex";
        userInfo.textContent = currentUser.email;
        loadConversations();
        updateUsageCounter();
        loadMemory();
      } else {
        loginScreen.style.display = "block";
        appScreen.style.display = "none";
      }
    }

    loginBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin,
          queryParams: { prompt: "select_account" },
        },
      });
    });

    logoutBtn.addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
    });

    newConvBtn.addEventListener("click", () => {
      currentConversationId = null;
      fullHistory = [];
      conversationSummary = "";
      summarizedCount = 0;
      logEl.textContent = "";
      highlightActiveConversation();
    });

    async function updateUsageCounter() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      const res = await fetch("/api/usage", {
        headers: { Authorization: `Bearer ${session.access_token}` },
      });
      if (!res.ok) {
        console.error("usage fetch failed", res.status, await res.text());
        return;
      }
      const { count, limit } = await res.json();
      usageCounter.textContent = `本日の利用回数: ${count} / ${limit}`;
    }

    // 第10章: ユーザーの永続的な記憶を読み込む(まだ無ければ空文字のまま)。
    async function loadMemory() {
      const { data, error } = await supabaseClient
        .from("memories")
        .select("content")
        .eq("user_id", currentUser.id)
        .maybeSingle();

      if (error) {
        console.error(error);
        return;
      }
      userMemory = data?.content ?? "";
    }

    async function loadConversations() {
      const { data, error } = await supabaseClient
        .from("conversations")
        .select("id, title, created_at")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        return;
      }

      convList.innerHTML = "";
      for (const conv of data) {
        const div = document.createElement("div");
        div.className = "conv-item";
        div.textContent = conv.title;
        div.dataset.id = conv.id;
        div.addEventListener("click", () => openConversation(conv.id));
        convList.appendChild(div);
      }
      highlightActiveConversation();
    }

    function highlightActiveConversation() {
      for (const el of convList.children) {
        el.classList.toggle("active", el.dataset.id === currentConversationId);
      }
    }

    async function openConversation(id) {
      currentConversationId = id;
      highlightActiveConversation();

      const { data: conv, error: convError } = await supabaseClient
        .from("conversations")
        .select("summary, summarized_count")
        .eq("id", id)
        .single();

      if (convError) {
        console.error(convError);
        return;
      }
      conversationSummary = conv.summary;

      const { data, error } = await supabaseClient
        .from("messages")
        .select("role, content, status")
        .eq("conversation_id", id)
        .order("created_at", { ascending: true });

      if (error) {
        console.error(error);
        return;
      }

      // 全文履歴(要約の元ネタ・直近抽出の対象)は、崩れていないか整えてから保持する。
      fullHistory = cleanHistory(data);
      // 安全装置: summarized_countがfullHistoryの件数を超えていたら(データのズレ)、
      // fullHistoryの件数に合わせて自己修復する。超えたままだと二度と要約が更新されなくなる。
      summarizedCount = Math.min(conv.summarized_count, fullHistory.length);

      // 画面表示は、中断されたpending発言もそのまま見せる(何が起きたか分かるように)。
      logEl.textContent = data
        .map((m) => {
          const label = m.role === "user" ? "あなた" : "AI";
          const note = m.status === "pending" ? "(未完了)" : "";
          return `${label}: ${m.content}${note}`;
        })
        .join("\n");
    }

    async function ensureConversation(firstMessage) {
      if (currentConversationId) return currentConversationId;

      const title = firstMessage.slice(0, 20);
      const { data, error } = await supabaseClient
        .from("conversations")
        .insert({ user_id: currentUser.id, title })
        .select("id")
        .single();

      if (error) {
        console.error(error);
        throw error;
      }

      currentConversationId = data.id;
      await loadConversations();
      return currentConversationId;
    }

    // status: "pending"(処理中・宙ぶらりん) or "done"(完了)。
    // AIへの送信を始めたらpending、返事が全部届いたらdoneに変える。
    async function saveMessage(conversationId, role, content, status) {
      const { data, error } = await supabaseClient
        .from("messages")
        .insert({ conversation_id: conversationId, role, content, status })
        .select("id")
        .single();
      if (error) console.error(error);
      return data?.id;
    }

    async function markMessageDone(messageId) {
      const { error } = await supabaseClient
        .from("messages")
        .update({ status: "done" })
        .eq("id", messageId);
      if (error) console.error(error);
    }

    // ステップ2: 会話を開くとき「整える」。
    // 完了(done)した発言だけを残し、pending(中断されて宙ぶらりんのまま)は捨てる。
    // pendingをAPIへ送らないことで、userが2連続するような崩れを防ぐ。
    function cleanHistory(rows) {
      return rows.filter((m) => m.status === "done");
    }

    // 第9章: 直近10件から外れた古い発言があれば、要約に組み込んで更新する。
    // 「前回までの要約」と「今回新たに外れた分の差分」だけをAIに渡す(全文は渡さない)。
    async function summarizeIfNeeded(conversationId) {
      const windowStart = Math.max(0, fullHistory.length - RECENT_WINDOW_SIZE);
      if (windowStart <= summarizedCount) return; // まだ直近10件から外れた発言はない

      const messagesToFold = fullHistory.slice(summarizedCount, windowStart);

      const { data: { session } } = await supabaseClient.auth.getSession();
      const res = await fetch("/api/summarize", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ previousSummary: conversationSummary, messagesToFold }),
      });

      if (!res.ok) {
        console.error("summarize failed", res.status, await res.text());
        return;
      }

      const { summary } = await res.json();
      conversationSummary = summary;
      summarizedCount = windowStart;

      const { error } = await supabaseClient
        .from("conversations")
        .update({ summary: conversationSummary, summarized_count: summarizedCount })
        .eq("id", conversationId);
      if (error) console.error(error);
    }

    // AIに実際に送る配列を組み立てる:
    // system設定 + 第10章:永続的な記憶 + 第9章:これまでの要約 + 直近10件 + 今回の発言。
    function buildChatPayload(newUserText) {
      const windowStart = Math.max(0, fullHistory.length - RECENT_WINDOW_SIZE);
      const recentMessages = fullHistory.slice(windowStart);

      const payload = [{ role: "system", content: SYSTEM_PROMPT }];
      if (userMemory) {
        // 会話をまたいで覚えている内容。どの会話を開いていても差し込む。
        payload.push({ role: "system", content: `ユーザーについて覚えていること: ${userMemory}` });
      }
      if (conversationSummary) {
        payload.push({ role: "system", content: `これまでの会話の要約: ${conversationSummary}` });
      }
      payload.push(...recentMessages);
      payload.push({ role: "user", content: newUserText });
      return payload;
    }

    // 第10章: 「覚えておいて」ボタン。今の会話(直近分)から、会話をまたいで覚えるべき
    // 情報を抜き出し、既存の記憶に追加・更新する。
    rememberBtn.addEventListener("click", async () => {
      if (!currentConversationId || fullHistory.length === 0) {
        memoryStatus.textContent = "覚えておく内容がまだありません。";
        return;
      }

      memoryStatus.textContent = "覚えています...";
      rememberBtn.disabled = true;

      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        const recentMessages = fullHistory.slice(-RECENT_WINDOW_SIZE);

        const res = await fetch("/api/remember", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${session.access_token}`,
          },
          body: JSON.stringify({ existingMemory: userMemory, recentMessages }),
        });

        if (!res.ok) {
          memoryStatus.textContent = "覚えるのに失敗しました。";
          console.error("remember failed", res.status, await res.text());
          return;
        }

        const { memory } = await res.json();
        userMemory = memory;

        const { error } = await supabaseClient
          .from("memories")
          .upsert(
            { user_id: currentUser.id, content: userMemory, updated_at: new Date().toISOString() },
            { onConflict: "user_id" }
          );
        if (error) {
          console.error(error);
          memoryStatus.textContent = "保存に失敗しました。";
          return;
        }

        memoryStatus.textContent = "覚えました！";
      } finally {
        rememberBtn.disabled = false;
      }
    });

    // ステップ3: 送信ボタンを「ロック」する(二重送信を防ぐ)。
    let isSending = false;

    formEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (isSending) return; // 送信中なら、なにもしない(連打を無視)
      const text = inputEl.value.trim();
      if (!text) return;

      isSending = true;
      formEl.querySelector("button").disabled = true;

      try {
        logEl.textContent += `\nあなた: ${text}`;
        inputEl.value = "";

        const conversationId = await ensureConversation(text);

        // 第9章: 送る前に、直近10件から外れた古い発言があれば要約に折りたたむ。
        // (fullHistoryはまだ今回の発言を含まない = 「これまでの」履歴の状態で判定する)
        await summarizeIfNeeded(conversationId);

        // AIへの送信を始めたのでpending(まだ途中)として保存する。
        const userMessageId = await saveMessage(conversationId, "user", text, "pending");

        const { data: { session } } = await supabaseClient.auth.getSession();

        // 全文(messages/DB)はそのまま残しつつ、AIに渡すのは要約+直近10件+今回の発言だけ。
        const chatPayload = buildChatPayload(text);

        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${session.access_token}`,
          },
          body: JSON.stringify({ messages: chatPayload }),
        });

        if (res.status === 429) {
          const errorData = await res.json();
          logEl.textContent += `\n${errorData.error}`;
          updateUsageCounter();
          return;
        }

        const data = await res.json();
        const replyText = data.reply.content;
        logEl.textContent += `\nAI: ${replyText}`;
        updateUsageCounter();

        // 第8章: サーバーが見積もったトークン数を画面に表示する(要約+直近10件+今回分の実際のサイズ)。
        tokenCounter.textContent = `概算トークン数: ${data.estimatedTokens}${data.nearLimit ? "(上限に近づいています)" : ""}`;

        // 全文履歴(fullHistory)には、要約対象になった分も含めてすべて積み上げておく。
        fullHistory.push({ role: "user", content: text });
        fullHistory.push({ role: "assistant", content: replyText });
        // 返事が全部届いたので、user発言をdoneに変え、assistant発言もdoneで保存する。
        await markMessageDone(userMessageId);
        await saveMessage(conversationId, "assistant", replyText, "done");
      } finally {
        // 成功でも失敗でも、必ずロックを解除する。
        isSending = false;
        formEl.querySelector("button").disabled = false;
      }
    });

    init();
  </script>
</body>
</html>
